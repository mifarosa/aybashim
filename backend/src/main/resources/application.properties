spring.application.name=backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/aybashim}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:secret}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW:false}

app.jwt.secret=${APP_JWT_SECRET:change-this-secret-before-production}
app.jwt.expiration-hours=${APP_JWT_EXPIRATION_HOURS:24}
